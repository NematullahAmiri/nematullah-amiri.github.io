<style>

/* =========================
   GLOBAL (PREMIUM DARK THEME)
========================= */

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

/* =========================
   NAVBAR (GLASS EFFECT)
========================= */

nav {
    position: sticky;
    top: 0;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(10px);
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

nav a {
    color: #e2e8f0;
    margin-left: 20px;
    text-decoration: none;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* =========================
   HERO SECTION
========================= */

.hero {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 100px 20px;
    text-align: center;
}

.hero img {
    width: 130px;
    border-radius: 50%;
    margin-bottom: 10px;
}

.hero h1 {
    font-size: 36px;
    margin: 10px 0;
}

.hero p {
    font-size: 18px;
    color: #cbd5e1;
}

/* =========================
   BUTTONS (MODERN)
========================= */

.btn {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: #38bdf8;
    color: #0f172a;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #0ea5e9;
    transform: translateY(-2px);
}

/* =========================
   SECTIONS
========================= */

section {
    padding: 60px 20px;
    max-width: 1000px;
    margin: auto;
}

/* =========================
   ABOUT (READABILITY)
========================= */

#about p {
    text-align: justify;
    line-height: 1.8;
    color: #cbd5e1;
}

/* =========================
   PROJECT CARDS (PREMIUM LOOK)
========================= */

.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 12px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-6px);
    border-color: #38bdf8;
}

/* LINKS INSIDE CARDS */
.card a {
    color: #38bdf8;
    text-decoration: none;
}

.card a:hover {
    color: #0ea5e9;
}

/* =========================
   CONTACT LINKS
========================= */

#contact a {
    color: #38bdf8;
    text-decoration: none;
}

#contact a:hover {
    color: #0ea5e9;
}

/* =========================
   FOOTER
========================= */

footer {
    background: #0f172a;
    color: #94a3b8;
    text-align: center;
    padding: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

/* =========================
   BACK TO TOP BUTTON
========================= */

#topBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #38bdf8;
    color: #0f172a;
    border: none;
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
}
